name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: check-${{ github.workflow }}-#${{ github.event.pull_request.number || github.head_ref || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@f5f2b16de3f7b95fa5ce9398c03e7b55bd6a4529 # pr/72
        with:
          node-version: '24'
          cache: true
          run-install: true
          sfw: true

      - name: Check
        run: vp run check

      - name: Check dedupe
        run: vp dedupe --check

      - name: Run typecheck
        run: vp run typecheck

      - name: Run build check
        run: vp run build

  test:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
        node: ['22', '24', '25']

    name: Test (${{ matrix.os }}, ${{ matrix.node }})
    runs-on: ${{ matrix.os }}

    concurrency:
      group: test-${{ github.workflow }}-#${{ github.event.pull_request.number || github.head_ref || github.ref }}-(${{ matrix.os }}, ${{ matrix.node }})
      cancel-in-progress: true

    permissions:
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@f5f2b16de3f7b95fa5ce9398c03e7b55bd6a4529 # pr/72
        with:
          node-version: ${{ matrix.node }}
          cache: true
          run-install: true
          sfw: true

      - name: Run tests
        run: vp run ci

      - name: Code Coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          use_oidc: true
